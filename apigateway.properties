eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.instance._id:$(random.value)}
spring.cloud.gateway.server.webflux.routes[0].id=studentservice
spring.cloud.gateway.server.webflux.routes[0].uri=lb://STUDENTSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/telusko/courses/**
